<svg width="760" height="170" viewBox="0 0 760 170" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,Consolas,monospace">
  <rect x="0" y="0" width="760" height="170" rx="10" fill="#0e1116"/>
  <text x="24" y="30" fill="#4cc38a" font-size="15" font-weight="bold">Manual inference — the differentiator</text>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b7785"/></marker>
  </defs>

  <!-- 1 -->
  <rect x="20" y="56" width="134" height="74" rx="8" fill="#161b22" stroke="#4cc38a"/>
  <text x="34" y="80" fill="#4cc38a" font-size="11" font-weight="bold">1 · pause</text>
  <text x="34" y="100" fill="#aab6c4" font-size="10">node calls</text>
  <text x="34" y="115" fill="#aab6c4" font-size="10">interrupt()</text>
  <line x1="154" y1="93" x2="184" y2="93" stroke="#6b7785" stroke-width="1.6" marker-end="url(#m)"/>

  <!-- 2 -->
  <rect x="186" y="56" width="134" height="74" rx="8" fill="#161b22" stroke="#283039"/>
  <text x="200" y="80" fill="#eaf0f7" font-size="11" font-weight="bold">2 · export</text>
  <text x="200" y="100" fill="#aab6c4" font-size="10">GraphLoupe shows</text>
  <text x="200" y="115" fill="#aab6c4" font-size="10">the rendered prompt</text>
  <line x1="320" y1="93" x2="350" y2="93" stroke="#6b7785" stroke-width="1.6" marker-end="url(#m)"/>

  <!-- 3 -->
  <rect x="352" y="56" width="150" height="74" rx="8" fill="#161b22" stroke="#283039"/>
  <text x="366" y="80" fill="#eaf0f7" font-size="11" font-weight="bold">3 · any chat</text>
  <text x="366" y="100" fill="#aab6c4" font-size="10">Copilot / ChatGPT /</text>
  <text x="366" y="115" fill="#aab6c4" font-size="10">Claude … paste reply</text>
  <line x1="502" y1="93" x2="532" y2="93" stroke="#6b7785" stroke-width="1.6" marker-end="url(#m)"/>

  <!-- 4 -->
  <rect x="534" y="56" width="206" height="74" rx="8" fill="#161b22" stroke="#4cc38a"/>
  <text x="548" y="80" fill="#4cc38a" font-size="11" font-weight="bold">4 · resume</text>
  <text x="548" y="100" fill="#aab6c4" font-size="10">graph continues from</text>
  <text x="548" y="115" fill="#aab6c4" font-size="10">the pause — zero state loss</text>

  <text x="24" y="156" fill="#6e7681" font-size="10">No API key needed. Swap interrupt() for a vscode.lm call and the same node becomes the Copilot auto-path.</text>
</svg>
