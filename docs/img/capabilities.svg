<svg width="760" height="190" viewBox="0 0 760 190" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,Consolas,monospace">
  <rect x="0" y="0" width="760" height="190" rx="10" fill="#0e1116"/>
  <text x="24" y="32" fill="#b69bff" font-size="15" font-weight="bold">Four capabilities</text>

  <!-- card 1 -->
  <rect x="24" y="50" width="170" height="118" rx="9" fill="#161b22" stroke="#6cb6ff"/>
  <text x="40" y="78" fill="#6cb6ff" font-size="20">🔍</text>
  <text x="40" y="104" fill="#eaf0f7" font-size="12" font-weight="bold">Visualization</text>
  <text x="40" y="124" fill="#aab6c4" font-size="10">auto-laid graph,</text>
  <text x="40" y="139" fill="#aab6c4" font-size="10">active node lights up,</text>
  <text x="40" y="154" fill="#aab6c4" font-size="10">sidebar overview</text>

  <!-- card 2 -->
  <rect x="208" y="50" width="170" height="118" rx="9" fill="#161b22" stroke="#e3b341"/>
  <text x="224" y="80" fill="#e3b341" font-size="18" font-weight="bold">‖</text>
  <text x="224" y="104" fill="#eaf0f7" font-size="12" font-weight="bold">Step debugging</text>
  <text x="224" y="124" fill="#aab6c4" font-size="10">breakpoints, state +</text>
  <text x="224" y="139" fill="#aab6c4" font-size="10">diff, step, time-travel</text>
  <text x="224" y="154" fill="#aab6c4" font-size="10">fork</text>

  <!-- card 3 -->
  <rect x="392" y="50" width="170" height="118" rx="9" fill="#161b22" stroke="#4cc38a"/>
  <text x="408" y="80" fill="#4cc38a" font-size="18">✋</text>
  <text x="408" y="104" fill="#eaf0f7" font-size="12" font-weight="bold">Manual inference</text>
  <text x="408" y="124" fill="#aab6c4" font-size="10">interrupt → paste into</text>
  <text x="408" y="139" fill="#aab6c4" font-size="10">any chat → resume,</text>
  <text x="408" y="154" fill="#aab6c4" font-size="10">zero state loss</text>

  <!-- card 4 -->
  <rect x="576" y="50" width="170" height="118" rx="9" fill="#161b22" stroke="#b69bff"/>
  <text x="592" y="80" fill="#b69bff" font-size="18">⟁</text>
  <text x="592" y="104" fill="#eaf0f7" font-size="12" font-weight="bold">Token economy</text>
  <text x="592" y="124" fill="#aab6c4" font-size="10">per-node prompt +</text>
  <text x="592" y="139" fill="#aab6c4" font-size="10">completion, run total,</text>
  <text x="592" y="154" fill="#aab6c4" font-size="10">heaviest-node hint</text>
</svg>
