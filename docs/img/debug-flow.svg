<svg width="760" height="170" viewBox="0 0 760 170" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,Consolas,monospace">
  <rect x="0" y="0" width="760" height="170" rx="10" fill="#0e1116"/>
  <text x="24" y="30" fill="#e3b341" font-size="15" font-weight="bold">Step debugging</text>
  <defs>
    <marker id="d" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b7785"/></marker>
  </defs>

  <rect x="20" y="56" width="150" height="74" rx="8" fill="#161b22" stroke="#f0726b"/>
  <text x="34" y="80" fill="#f0726b" font-size="11" font-weight="bold">● breakpoint</text>
  <text x="34" y="100" fill="#aab6c4" font-size="10">click a node to</text>
  <text x="34" y="115" fill="#aab6c4" font-size="10">arm it</text>
  <line x1="170" y1="93" x2="200" y2="93" stroke="#6b7785" stroke-width="1.6" marker-end="url(#d)"/>

  <rect x="202" y="56" width="150" height="74" rx="8" fill="#161b22" stroke="#e3b341"/>
  <text x="216" y="80" fill="#e3b341" font-size="11" font-weight="bold">‖ pause</text>
  <text x="216" y="100" fill="#aab6c4" font-size="10">run stops before</text>
  <text x="216" y="115" fill="#aab6c4" font-size="10">the node</text>
  <line x1="352" y1="93" x2="382" y2="93" stroke="#6b7785" stroke-width="1.6" marker-end="url(#d)"/>

  <rect x="384" y="56" width="150" height="74" rx="8" fill="#161b22" stroke="#283039"/>
  <text x="398" y="80" fill="#eaf0f7" font-size="11" font-weight="bold">inspect</text>
  <text x="398" y="100" fill="#aab6c4" font-size="10">state snapshot</text>
  <text x="398" y="115" fill="#aab6c4" font-size="10">+ channel diff</text>
  <line x1="534" y1="93" x2="564" y2="93" stroke="#6b7785" stroke-width="1.6" marker-end="url(#d)"/>

  <rect x="566" y="56" width="174" height="74" rx="8" fill="#161b22" stroke="#283039"/>
  <text x="580" y="80" fill="#eaf0f7" font-size="11" font-weight="bold">advance</text>
  <text x="580" y="100" fill="#aab6c4" font-size="10">⏭ step · ▶ continue</text>
  <text x="580" y="115" fill="#aab6c4" font-size="10">⑂ fork (time-travel)</text>

  <text x="24" y="156" fill="#6e7681" font-size="10">Needs compile(checkpointer=…). Fork re-runs from a past checkpoint with an optional state override.</text>
</svg>
