<svg width="360" height="460" viewBox="0 0 360 460" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,Consolas,monospace">
  <rect x="0" y="0" width="360" height="460" rx="10" fill="#0e1116"/>
  <text x="20" y="26" fill="#4cc38a" font-size="13" font-weight="bold">▶ execution replay</text>
  <text x="20" y="42" fill="#6e7681" font-size="9">the active node lights up as the graph runs</text>

  <defs>
    <marker id="rf" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b7785"/></marker>
    <marker id="ra" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e3b341"/></marker>
  </defs>

  <!-- nodes are evenly pitched 80px: tops at 64,144,224,304,384 (all 160x44, centred x160) -->
  <!-- forward edges: each line spans source-bottom -> target-top so the arrow meets the border -->
  <line x1="160" y1="108" x2="160" y2="144" stroke="#6b7785" stroke-width="1.6" marker-end="url(#rf)"/>
  <line x1="160" y1="188" x2="160" y2="224" stroke="#6b7785" stroke-width="1.6" marker-end="url(#rf)"/>
  <line x1="160" y1="268" x2="160" y2="304" stroke="#6b7785" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#rf)"/>
  <text x="166" y="290" fill="#e3b341" font-size="9">human</text>
  <line x1="160" y1="348" x2="160" y2="384" stroke="#6b7785" stroke-width="1.6" marker-end="url(#rf)"/>
  <!-- redo loop (amber, left): gate left-mid -> plan left-mid -->
  <polyline points="80,246 44,246 44,166 80,166" fill="none" stroke="#e3b341" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#ra)"/>
  <text x="16" y="210" fill="#e3b341" font-size="9">↺ redo</text>
  <!-- auto (dashed, right): gate right-mid -> synthesize right-mid -->
  <polyline points="240,246 312,246 312,406 240,406" fill="none" stroke="#6b7785" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#rf)"/>
  <text x="284" y="238" fill="#e3b341" font-size="9">auto</text>

  <!-- nodes -->
  <g font-size="11">
    <rect x="80" y="64"  width="160" height="44" rx="8" fill="#161b22" stroke="#283039"/><text x="96" y="90"  fill="#eaf0f7">ingest</text>
    <rect x="80" y="144" width="160" height="44" rx="8" fill="#161b22" stroke="#b69bff"/><text x="96" y="170" fill="#b69bff">⚡ plan</text>
    <rect x="80" y="224" width="160" height="44" rx="8" fill="#161b22" stroke="#283039"/><text x="96" y="250" fill="#eaf0f7">gate</text>
    <rect x="80" y="304" width="160" height="44" rx="8" fill="#161b22" stroke="#b69bff"/><text x="96" y="330" fill="#b69bff">⚡ review</text>
    <rect x="80" y="384" width="160" height="44" rx="8" fill="#161b22" stroke="#b69bff"/><text x="96" y="410" fill="#b69bff">⚡ synthesize</text>
  </g>

  <!-- moving active-node highlight (on top): dwells at each node in execution order
       (ingest, plan, gate, plan[redo], gate, review, synthesize) on an 11s loop.
       translucent fill keeps the label readable; green border = "active". -->
  <rect x="80" y="64" width="160" height="44" rx="8" fill="rgba(76,195,138,0.16)" stroke="#4cc38a" stroke-width="2">
    <animate attributeName="y" dur="11s" repeatCount="indefinite" calcMode="discrete"
      keyTimes="0;0.125;0.25;0.375;0.5;0.625;0.75;1"
      values="64;144;224;144;224;304;384;384"/>
  </rect>
</svg>
