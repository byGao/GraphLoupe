<svg width="760" height="300" viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,Consolas,monospace">
  <rect x="0" y="0" width="760" height="300" rx="10" fill="#0e1116"/>
  <text x="24" y="30" fill="#b69bff" font-size="15" font-weight="bold">Write this → GraphLoupe shows that</text>
  <text x="24" y="50" fill="#8b97a6" font-size="11">it reads your graph as written; none required, each unlocks one thing</text>
  <defs>
    <marker id="g" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6cb6ff"/></marker>
  </defs>

  <!-- headers -->
  <text x="40" y="78" fill="#6e7681" font-size="10">in your graph</text>
  <text x="470" y="78" fill="#6e7681" font-size="10">on the canvas</text>

  <!-- rows -->
  <g font-size="11">
    <text x="40" y="104" fill="#aab6c4">node docstring</text>
    <line x1="300" y1="100" x2="455" y2="100" stroke="#6cb6ff" stroke-width="1.3" marker-end="url(#g)"/>
    <text x="470" y="104" fill="#eaf0f7">node purpose + overview row</text>

    <text x="40" y="134" fill="#aab6c4">references a chat model</text>
    <line x1="300" y1="130" x2="455" y2="130" stroke="#6cb6ff" stroke-width="1.3" marker-end="url(#g)"/>
    <text x="470" y="134" fill="#b69bff">⚡ llm lane + token counts</text>

    <text x="40" y="164" fill="#aab6c4">interrupt(payload)</text>
    <line x1="300" y1="160" x2="455" y2="160" stroke="#6cb6ff" stroke-width="1.3" marker-end="url(#g)"/>
    <text x="470" y="164" fill="#4cc38a">manual-inference pause</text>

    <text x="40" y="194" fill="#aab6c4">Pydantic Field(description=…)</text>
    <line x1="300" y1="190" x2="455" y2="190" stroke="#6cb6ff" stroke-width="1.3" marker-end="url(#g)"/>
    <text x="470" y="194" fill="#eaf0f7">run-form field + description</text>

    <text x="40" y="224" fill="#aab6c4">compile(checkpointer=…)</text>
    <line x1="300" y1="220" x2="455" y2="220" stroke="#6cb6ff" stroke-width="1.3" marker-end="url(#g)"/>
    <text x="470" y="224" fill="#e3b341">breakpoints / step / time-travel</text>

    <text x="40" y="254" fill="#aab6c4">add_conditional_edges(…)</text>
    <line x1="300" y1="250" x2="455" y2="250" stroke="#6cb6ff" stroke-width="1.3" marker-end="url(#g)"/>
    <text x="470" y="254" fill="#e3b341">dashed branch edges + labels</text>

    <text x="40" y="284" fill="#aab6c4">top-level build_graph()</text>
    <line x1="300" y1="280" x2="455" y2="280" stroke="#6cb6ff" stroke-width="1.3" marker-end="url(#g)"/>
    <text x="470" y="284" fill="#eaf0f7">discoverable by "Select Graph"</text>
  </g>
</svg>
