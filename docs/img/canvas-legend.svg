<svg width="760" height="300" viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,Consolas,monospace">
  <rect x="0" y="0" width="760" height="300" rx="10" fill="#0e1116"/>
  <text x="24" y="32" fill="#b69bff" font-size="15" font-weight="bold">Reading the canvas</text>
  <text x="24" y="52" fill="#8b97a6" font-size="11">ELK orthogonal layout · edges never overlap or cut through nodes</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b7785"/></marker>
    <marker id="arrA" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#e3b341"/></marker>
  </defs>

  <!-- script node -->
  <rect x="60" y="86" width="150" height="58" rx="8" fill="#161b22" stroke="#283039"/>
  <text x="76" y="110" fill="#eaf0f7" font-size="12" font-weight="bold">gate</text>
  <text x="76" y="130" fill="#aab6c4" font-size="10">script node</text>
  <!-- llm node -->
  <rect x="60" y="186" width="150" height="58" rx="8" fill="#161b22" stroke="#b69bff"/>
  <text x="76" y="210" fill="#b69bff" font-size="12" font-weight="bold">⚡ plan</text>
  <text x="76" y="230" fill="#aab6c4" font-size="10">llm / inference node</text>

  <!-- legend column -->
  <text x="300" y="100" fill="#d6dee8" font-size="12" font-weight="bold">node colour = kind</text>
  <rect x="300" y="112" width="14" height="14" rx="3" fill="#161b22" stroke="#283039"/><text x="324" y="124" fill="#aab6c4" font-size="11">script — plain code</text>
  <rect x="300" y="134" width="14" height="14" rx="3" fill="#161b22" stroke="#b69bff"/><text x="324" y="146" fill="#b69bff" font-size="11">⚡ llm / inference (model or interrupt)</text>

  <text x="300" y="184" fill="#d6dee8" font-size="12" font-weight="bold">edges</text>
  <!-- forward -->
  <line x1="304" y1="206" x2="360" y2="206" stroke="#6b7785" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="372" y="210" fill="#aab6c4" font-size="11">forward (flows downward)</text>
  <!-- branch dashed -->
  <line x1="304" y1="232" x2="360" y2="232" stroke="#6b7785" stroke-width="1.6" stroke-dasharray="6 3" marker-end="url(#arr)"/>
  <text x="372" y="236" fill="#e3b341" font-size="11">conditional branch (labelled: human/auto…)</text>
  <!-- loop amber -->
  <line x1="304" y1="258" x2="360" y2="258" stroke="#e3b341" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#arrA)"/>
  <text x="372" y="262" fill="#e3b341" font-size="11">↺ loop / back edge (routed on the left)</text>

  <text x="24" y="284" fill="#6e7681" font-size="10">A node carries its purpose (first docstring line); the sidebar lists every node, click a row to focus it.</text>
</svg>
