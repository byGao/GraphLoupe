<svg width="760" height="360" viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Cascadia Code',ui-monospace,Consolas,monospace">
  <rect x="0" y="0" width="760" height="360" rx="10" fill="#0e1116"/>
  <text x="24" y="34" fill="#b69bff" font-size="15" font-weight="bold">GraphLoupe — architecture</text>
  <text x="24" y="54" fill="#8b97a6" font-size="11">your compiled LangGraph runs only in an isolated worker; the IDE never imports it</text>

  <!-- VS Code Extension -->
  <rect x="24" y="84" width="236" height="234" rx="9" fill="#161b22" stroke="#283039"/>
  <text x="42" y="110" fill="#d6dee8" font-size="13" font-weight="bold">VS Code Extension</text>
  <rect x="44" y="126" width="196" height="84" rx="7" fill="#0c1014" stroke="#283039"/>
  <text x="56" y="150" fill="#6cb6ff" font-size="11">Webview</text>
  <text x="56" y="170" fill="#8b97a6" font-size="10">React Flow canvas</text>
  <text x="56" y="186" fill="#8b97a6" font-size="10">overview · token panel</text>
  <text x="56" y="202" fill="#8b97a6" font-size="10">manual-inference panel</text>
  <rect x="44" y="222" width="196" height="76" rx="7" fill="#0c1014" stroke="#283039"/>
  <text x="56" y="244" fill="#6cb6ff" font-size="11">Extension host</text>
  <text x="56" y="263" fill="#8b97a6" font-size="10">spawn sidecar · bridge</text>
  <text x="56" y="279" fill="#e3b341" font-size="10">vscode.lm (Copilot)</text>

  <!-- Sidecar -->
  <rect x="300" y="120" width="180" height="120" rx="9" fill="#161b22" stroke="#283039"/>
  <text x="318" y="146" fill="#d6dee8" font-size="13" font-weight="bold">FastAPI sidecar</text>
  <text x="318" y="168" fill="#8b97a6" font-size="10">/ws WebSocket relay</text>
  <text x="318" y="186" fill="#8b97a6" font-size="10">holds compiled graph</text>
  <text x="318" y="210" fill="#4cc38a" font-size="10">protocol.py  ⇄  protocol.ts</text>
  <text x="318" y="226" fill="#6e7681" font-size="9">frozen contract (L1 golden)</text>

  <!-- Worker -->
  <rect x="520" y="120" width="216" height="120" rx="9" fill="#161b22" stroke="#4cc38a"/>
  <text x="538" y="146" fill="#4cc38a" font-size="13" font-weight="bold">worker subprocess</text>
  <text x="538" y="168" fill="#8b97a6" font-size="10">imports + runs YOUR graph</text>
  <text x="538" y="186" fill="#8b97a6" font-size="10">astream_events(v2)</text>
  <text x="538" y="204" fill="#8b97a6" font-size="10">interrupt / breakpoints</text>
  <text x="538" y="226" fill="#6e7681" font-size="9">crash/hang contained here</text>

  <!-- arrows extension <-> sidecar -->
  <defs>
    <marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#6b7785"/></marker>
  </defs>
  <line x1="260" y1="168" x2="298" y2="168" stroke="#6b7785" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="262" y="160" fill="#8b97a6" font-size="9">Command</text>
  <line x1="300" y1="196" x2="262" y2="196" stroke="#6b7785" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="262" y="212" fill="#8b97a6" font-size="9">ServerEvent</text>

  <!-- sidecar <-> worker -->
  <line x1="480" y1="168" x2="518" y2="168" stroke="#6b7785" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="482" y="160" fill="#8b97a6" font-size="9">stdin cmd</text>
  <line x1="520" y1="196" x2="482" y2="196" stroke="#6b7785" stroke-width="1.6" marker-end="url(#a)"/>
  <text x="482" y="212" fill="#8b97a6" font-size="9">events</text>

  <text x="24" y="344" fill="#6e7681" font-size="10">Copilot prompts go extension → vscode.lm only; the sidecar never sees credentials (consent boundary).</text>
</svg>
