name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-gate:
    name: quality gate (L0 + L1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          # Dev tooling the gate's L0 invokes (not part of the runtime lock).
          pip install flake8==7.3.0 mypy==2.1.0 bandit==1.9.4 pytest==8.3.4

      - name: Install Node deps
        run: npm ci

      - name: Run quality gate (live levels)
        run: python scripts/quality_gate.py --live
